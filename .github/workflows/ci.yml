name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config zlib1g-dev libssl-dev
      - run: cargo check --all-targets

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config zlib1g-dev libssl-dev
      - run: cargo test --all

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config zlib1g-dev libssl-dev
      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config openssl zlib
      - name: Configure native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix zlib)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"
      - run: cargo build --release
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagecompression-${{ matrix.os }}
          path: |
            target/release/ImageCompression*
            target/release/imagecompression*
