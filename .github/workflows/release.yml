name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  LIBAVIF_VERSION: v1.4.1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary_name: ImageCompression.exe
            asset_name: imagecompression-x86_64-windows.zip
            include_libavif: true
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            binary_name: ImageCompression.exe
            asset_name: imagecompression-aarch64-windows.zip
            include_libavif: true
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary_name: imagecompression
            asset_name: imagecompression-x86_64-linux.tar.gz
          # Linux aarch64 (use cross)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary_name: imagecompression
            asset_name: imagecompression-aarch64-linux.tar.gz
            use_cross: true
            vendored_openssl: true
          # macOS x86_64 (Intel)
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary_name: imagecompression
            asset_name: imagecompression-x86_64-macos.tar.gz
            vendored_openssl: true
          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary_name: imagecompression
            asset_name: imagecompression-aarch64-macos.tar.gz
            vendored_openssl: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config zlib1g-dev libssl-dev

      - name: Install native dependencies (macOS)
        if: ${{ runner.os == 'macOS' && !matrix.vendored_openssl }}
        run: brew install pkg-config openssl zlib

      - name: Configure native dependencies (macOS)
        if: ${{ runner.os == 'macOS' && !matrix.vendored_openssl }}
        run: |
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix zlib)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.use_cross && !matrix.vendored_openssl }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (native, vendored OpenSSL)
        if: ${{ !matrix.use_cross && matrix.vendored_openssl }}
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features sftp-vendored-openssl

      - name: Build (cross)
        if: ${{ matrix.use_cross && !matrix.vendored_openssl }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cross, vendored OpenSSL)
        if: ${{ matrix.use_cross && matrix.vendored_openssl }}
        run: cross build --release --target ${{ matrix.target }} --no-default-features --features sftp-vendored-openssl

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          # The binary is produced as "ImageCompression" from [[bin]] name, but we normalize to lowercase for archive
          BIN_PATH="target/${{ matrix.target }}/release/ImageCompression"
          if [ ! -f "$BIN_PATH" ]; then
            BIN_PATH="target/${{ matrix.target }}/release/imagecompression"
          fi
          strip "$BIN_PATH" || true
          chmod +x "$BIN_PATH"
          mkdir -p dist
          cp "$BIN_PATH" "dist/${{ matrix.binary_name }}"

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binPath = "target/${{ matrix.target }}/release/ImageCompression.exe"
          if (-not (Test-Path $binPath)) {
            $binPath = "target/${{ matrix.target }}/release/imagecompression.exe"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $binPath "dist/${{ matrix.binary_name }}"

      - name: Download libavif tools (Windows)
        if: matrix.include_libavif
        shell: pwsh
        run: |
          $url = "https://github.com/AOMediaCodec/libavif/releases/download/${env:LIBAVIF_VERSION}/windows-artifacts.zip"
          New-Item -ItemType Directory -Force -Path dist/windows-artifacts | Out-Null
          Invoke-WebRequest -Uri $url -OutFile windows-artifacts.zip
          Expand-Archive -Path windows-artifacts.zip -DestinationPath libavif -Force
          $required = @("avifenc.exe", "avifdec.exe", "avifgainmaputil.exe")
          foreach ($name in $required) {
            $match = Get-ChildItem -Path libavif -Recurse -Filter $name | Select-Object -First 1
            if (-not $match) {
              throw "libavif artifact missing $name"
            }
            Copy-Item $match.FullName "dist/windows-artifacts/$name" -Force
          }
          "${env:LIBAVIF_VERSION}" | Set-Content -Path dist/windows-artifacts/libavif-version.txt -NoNewline

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf ../${{ matrix.asset_name }} ${{ matrix.binary_name }}
          cd ..

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd dist
          7z a ../${{ matrix.asset_name }} *
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > ../sha256sums.txt
          cd ..
          mv sha256sums.txt artifacts/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Bundled tools"
            echo
            echo "Windows archives include official libavif command-line tools from AOMediaCodec/libavif ${LIBAVIF_VERSION}."
            echo
            echo "- Source: https://github.com/AOMediaCodec/libavif/releases/tag/${LIBAVIF_VERSION}"
            echo "- Changelog: https://github.com/AOMediaCodec/libavif/releases/tag/${LIBAVIF_VERSION}"
            echo "- Included files: avifenc.exe, avifdec.exe, avifgainmaputil.exe"
            echo
            echo "## libavif ${LIBAVIF_VERSION} changelog"
            echo
            gh release view "${LIBAVIF_VERSION}" --repo AOMediaCodec/libavif --json body --jq .body
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          files: |
            artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksums (if needed)
        # The previous step already uploads everything including sha256sums.txt
        run: echo "Checksums included in release assets"
